<!DOCTYPE html>
<html>

<head>
  <title>Spiritual Eyes</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    input {
      padding: 12px;
      width: 250px;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    #book {
      display: none;
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #444;
    }
  </style>
</head>

<body>

  <h1>🔐 Spiritual Eyes</h1>

  <p>Enter your license key</p>

  <input id="key" placeholder="License Key">

  <br>

  <button onclick="unlockBook()">Unlock Book</button>

  <p id="msg"></p>

  <div id="book">

  <div id="controls">

  <div style="margin-bottom:10px;">
  <label>Speed: </label>
  <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
  <span id="speedValue">1</span>
  </div> 

  <button onclick="readBook()">🔊 Read Book</button>

  <button onclick="pauseVoice()">⏸ Pause</button>

  <button onclick="prevPage()">⬅ Prev</button>

  <button onclick="nextPage()">Next ➡</button>

  <span id="pageNum">Page: 1</span>

</div>

  <canvas id="pdf-render"></canvas>

  <div id="textLayer" style="
  margin-top:20px;
  padding:15px;
  text-align:left;
  line-height:1.6;
  font-size:18px;
  max-width:800px;
  margin-left:auto;
  margin-right:auto;
  background:#111;
  border-radius:10px;
"></div> 

  </div>

  <script>
    const SUPABASE_URL = "https://xbemkmvvbkxknuduthsg.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let pdfDoc = null;
    let pageNum = 1;
    let canvas = null;
    let ctx = null;
    let currentSpeech = null;
    let speechSpeed = 1;
    let currentWords = [];
    let highlightIndex = 0;

    async function unlockBook() {

      let userKey = document.getElementById("key").value;
      let msg = document.getElementById("msg");

      let { data, error } = await client
        .from("licenses")
        .select("*")
        .eq("key", userKey);

      if (error) {
        msg.innerHTML = "ERROR: " + JSON.stringify(error);
        return;
      }

      if (!data || data.length === 0) {
        msg.innerHTML = "Invalid License ❌";
        return;
      }

      let license = data[0];

      if (license.status !== "active") {
        msg.innerHTML = "License Blocked ❌";
        return;
      }

      let deviceID = localStorage.getItem("deviceID");

      if (!deviceID) {
        deviceID = "DEV-" + Math.random().toString(36).substring(2);
        localStorage.setItem("deviceID", deviceID);
      }

      if (!license.device_id) {
        await client
          .from("licenses")
          .update({ device_id: deviceID })
          .eq("id", license.id);
      }

      if (license.device_id && license.device_id !== deviceID) {
        msg.innerHTML = "Used on another device ❌";
        return;
      }

      document.getElementById("book").style.display = "block";

      msg.innerHTML = "Access Granted ✔";

      renderPDF();

      }

    async function readBook() {

  let text = await getPageText(pageNum);

  let words = text.split(" ");
  let currentIndex = 0;

function updateHighlight() {

  let displayWords = [...words];

  displayWords[currentIndex] =
    `<span style="background:yellow;color:black;">${displayWords[currentIndex]}</span>`;

  document.getElementById("textLayer").innerHTML =
    displayWords.join(" ");

}

  if (!text || text.trim().length === 0) return;

  let speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";
  speech.rate = speechSpeed;

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}

    async function renderPDF() {

  const url = 'learn.pdf';

  pdfDoc = await pdfjsLib.getDocument(url).promise;

  canvas = document.getElementById('pdf-render');
  ctx = canvas.getContext('2d');

  renderPage(pageNum);
}

    async function renderPage(num) {

  const page = await pdfDoc.getPage(num);

  const scale = 1.5;
  const viewport = page.getViewport({ scale });

  canvas.height = viewport.height;
  canvas.width = viewport.width;

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  document.getElementById("pageNum").innerText = "Page: " + num;
}

  getPageText(num).then(text => {
  document.getElementById("textLayer").innerText = text;
}); 

    function nextPage() {

  if (currentSpeech) {
    window.speechSynthesis.cancel();
    currentSpeech = null;
  }

  if (pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {

  if (currentSpeech) {
    window.speechSynthesis.cancel();
    currentSpeech = null;
  }

  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

    async function getPageText(pageNumber) {

  const page = await pdfDoc.getPage(pageNumber);

  const textContent = await page.getTextContent();

  let text = "";

  textContent.items.forEach(item => {
    text += item.str + " ";
  });

  return text;
}

    function pauseVoice() {
  window.speechSynthesis.pause();
}

document.getElementById("speed").addEventListener("input", function () {
  speechSpeed = parseFloat(this.value);
  document.getElementById("speedValue").innerText = speechSpeed;
});  
    

</script>
</body>
</html>
