<body>

<h1>🔐 How To Hear Voice Of God</h1>

  <script>
    const SUPABASE_URL = "https://xbemkmvvbkxknuduthsg.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let pdfDoc = null;
    let pageNum = 1;
    let canvas = null;
    let ctx = null;
    let currentSpeech = null;
    let speechSpeed = 1;

    const books = [
  { title: "How to Hear Voice of God", price: "$5" },
  { title: "Spiritual Eyes Guide", price: "$7" },
  { title: "Inner Peace Book", price: "$4" }
    ];

    async function unlockBook() {

      let userKey = document.getElementById("key").value;
      let msg = document.getElementById("msg");

      let { data, error } = await client
        .from("licenses")
        .select("*")
        .eq("key", userKey);

      if (error) {
        msg.innerHTML = "ERROR: " + JSON.stringify(error);
        return;
      }

      if (!data || data.length === 0) {
        msg.innerHTML = "Unexpected License, Contact admin";
        return;
      }

      let license = data[0];

      if (license.status !== "active") {
        msg.innerHTML = "secured by deka 🔐";
        return;
      }

      let deviceID = localStorage.getItem("deviceID");

      if (!deviceID) {
        deviceID = "DEV-" + Math.random().toString(36).substring(2);
        localStorage.setItem("deviceID", deviceID);
      }

      if (!license.device_id) {
        await client
          .from("licenses")
          .update({ device_id: deviceID })
          .eq("id", license.id);
      }

      if (license.device_id && license.device_id !== deviceID) {
        msg.innerHTML = "Used on another device 🔐 ";
        return;
      }

      msg.innerHTML = "Access Granted ✔";

      setTimeout(() => {

     document.getElementById("licenseScreen").style.display = "none";

     document.getElementById("book").style.display = "block";

     renderPDF();

     }, 1000);

      }

    async function readBook() {

  if (!pdfDoc) return;

  let text = await getPageText(pageNum);

  if (!text || text.trim().length === 0) {
    alert("No text found on this page");
    return;
  }

  let speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";
  speech.rate = speechSpeed;

  if (currentSpeech) {
  window.speechSynthesis.cancel();
}

currentSpeech = speech;

window.speechSynthesis.speak(speech);
}
  
  async function renderPDF() {

  const url = 'holly.pdf';

  pdfDoc = await pdfjsLib.getDocument(url).promise;

  canvas = document.getElementById('pdf-render');
  ctx = canvas.getContext('2d');

  renderPage(pageNum);
}

    async function renderPage(num) {

  const page = await pdfDoc.getPage(num);

  const canvas = document.getElementById('pdf-render');
  const ctx = canvas.getContext('2d');

  // 📱 screen size
  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;

  const viewport = page.getViewport({ scale: 1 });

  // 🔥 FIT TO FULL SCREEN (width + height)
  const scaleX = screenWidth / viewport.width;
  const scaleY = screenHeight / viewport.height;

  const scale = Math.min(scaleX, scaleY) * 1.2;

  const scaledViewport = page.getViewport({ scale });

  canvas.width = scaledViewport.width;
  canvas.height = scaledViewport.height;

  // center it properly
  canvas.style.position = "absolute";
  canvas.style.left = "50%";
  canvas.style.top = "45%";
  canvas.style.transform = "translate(-50%, -50%)";

  await page.render({
    canvasContext: ctx,
    viewport: scaledViewport
  }).promise;

  document.getElementById("pageNum").innerText = "Page: " + num;
    }

    function nextPage() {

  if (currentSpeech) {
    window.speechSynthesis.cancel();
    currentSpeech = null;
  }

  if (pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {

  if (currentSpeech) {
    window.speechSynthesis.cancel();
    currentSpeech = null;
  }

  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

    async function getPageText(pageNumber) {

  const page = await pdfDoc.getPage(pageNumber);

  const textContent = await page.getTextContent();

  let text = "";

  textContent.items.forEach(item => {
    text += item.str + " ";
  });

  return text;
}

    function pauseVoice() {
  window.speechSynthesis.pause();
}

document.getElementById("speed").addEventListener("input", function () {
  speechSpeed = parseFloat(this.value);
  document.getElementById("speedValue").innerText = speechSpeed;
});

    function toggleControls() {

  let controls = document.getElementById("controls");

  if (controls.style.display === "block") {
    controls.style.display = "none";
  } else {
    controls.style.display = "block";
  }

    }
    
    if ("serviceWorker" in navigator) {

  window.addEventListener("load", () => {

    navigator.serviceWorker.register("./sw.js")

      .then(() => {
        console.log("SW Registered");
      })

      .catch((err) => {
        console.log("SW Failed", err);
      });

  });

}

    let deferredPrompt;

const installBtn = document.getElementById("installBtn");

// hide button first
installBtn.style.display = "none";

// if already installed → keep hidden
if (window.matchMedia('(display-mode: standalone)').matches) {
  installBtn.style.display = "none";
}

// Chrome says app can install
window.addEventListener("beforeinstallprompt", (e) => {

  e.preventDefault();

  deferredPrompt = e;

  // show install button
  installBtn.style.display = "block";
});

// user presses install
installBtn.addEventListener("click", async () => {

  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const result = await deferredPrompt.userChoice;

  if (result.outcome === "accepted") {

    // hide after install
    installBtn.style.display = "none";

  }

  deferredPrompt = null;

});

// app installed successfully
window.addEventListener("appinstalled", () => {

  installBtn.style.display = "none";

});

const voiceMessages = [
  "🔊 Voice reader is being improved for smoother experience. Please be patient.",
  "⚙️ We are fixing voice issues to make reading more stable. Thank you for your patience."
];

let msgIndex = 0;

function showVoiceNotice() {
  const box = document.getElementById("voiceNotice");

  if (!box) return;

  box.innerText = voiceMessages[msgIndex];

  // fade in
  box.style.opacity = 1;

  setTimeout(() => {
    box.style.opacity = 0;
  }, 4000);

  msgIndex = (msgIndex + 1) % voiceMessages.length;
}

// start loop
showVoiceNotice();
setInterval(showVoiceNotice, 5000); 

   let headerIndex = 0;

    cart.style.transform = "scale(1.2)";

  }, 3000);
}

startHeaderLoop();

    function renderBooks() {
  const list = document.getElementById("bookList");

  list.innerHTML = "";

  books.forEach(book => {

    item.style = `

</script>
