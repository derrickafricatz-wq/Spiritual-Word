<!DOCTYPE html>
<html>

<head>
  <title>Spiritual Eyes</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    input {
      padding: 12px;
      width: 250px;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    #book {
      display: none;
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #444;
    }
  </style>
</head>

<body>

  <h1>🔐 Spiritual Eyes</h1>

  <p>Enter your license key</p>

  <input id="key" placeholder="License Key">

  <br>

  <button onclick="unlockBook()">Unlock Book</button>

  <p id="msg"></p>

  <div id="book">

  <div id="controls">

    <button onclick="readBook()">🔊 Read Book</button>

  </div>

  <canvas id="pdf-render"></canvas>

  </div>

  <script>
    const SUPABASE_URL = "https://xbemkmvvbkxknuduthsg.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function unlockBook() {

      let userKey = document.getElementById("key").value;
      let msg = document.getElementById("msg");

      let { data, error } = await client
        .from("licenses")
        .select("*")
        .eq("key", userKey);

      if (error) {
        msg.innerHTML = "ERROR: " + JSON.stringify(error);
        return;
      }

      if (!data || data.length === 0) {
        msg.innerHTML = "Invalid License ❌";
        return;
      }

      let license = data[0];

      if (license.status !== "active") {
        msg.innerHTML = "License Blocked ❌";
        return;
      }

      let deviceID = localStorage.getItem("deviceID");

      if (!deviceID) {
        deviceID = "DEV-" + Math.random().toString(36).substring(2);
        localStorage.setItem("deviceID", deviceID);
      }

      if (!license.device_id) {
        await client
          .from("licenses")
          .update({ device_id: deviceID })
          .eq("id", license.id);
      }

      if (license.device_id && license.device_id !== deviceID) {
        msg.innerHTML = "Used on another device ❌";
        return;
      }

      document.getElementById("book").style.display = "block";

      msg.innerHTML = "Access Granted ✔";

      renderPDF();

      }

    function readBook() {

  let text =
    "Welcome to Spiritual Eyes. This is the audio reading system.";

  let speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";
  speech.rate = 1;

  window.speechSynthesis.speak(speech);

}

  async function renderPDF() {

  const url = 'learn.pdf';

  const pdf = await pdfjsLib.getDocument(url).promise;

  const page = await pdf.getPage(1);

  const scale = 1.5;

  const viewport = page.getViewport({ scale });

  const canvas = document.getElementById('pdf-render');

  const context = canvas.getContext('2d');

  canvas.height = viewport.height;
  canvas.width = viewport.width;

  await page.render({
    canvasContext: context,
    viewport: viewport
  }).promise;

}  
    

</script>
</body>
</html>
