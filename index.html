<!DOCTYPE html>
<html>

<head>

  <title>Spiritual Eyes</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    body{
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
      padding-top:100px;
    }

    input{
      padding:12px;
      width:250px;
      border:none;
      border-radius:8px;
      margin-top:20px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      margin-top:10px;
      cursor:pointer;
    }

    #book{
      display:none;
      margin-top:40px;
      padding:20px;
      border:1px solid #444;
    }

  </style>

</head>

<body>

<h1>🔐 Spiritual Eyes</h1>

<p>Enter your license key</p>

<input id="key" placeholder="License Key">

<br>

<button onclick="unlockBook()">
Unlock Book
</button>

<p id="msg"></p>

<div id="book">

<iframe
src="book.pdf"
width="100%"
height="700px"
style="border:none;">
</iframe>

</div>

<script>

const SUPABASE_URL =
"https://xbemkmvvbkxknuduthsg.supabase.co";

const SUPABASE_KEY =
"sb_publishable_mUNYUtotJGrESIeSu0HrVg_WxzGWqqvC";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function unlockBook(){

  let userKey =
  document.getElementById("key").value;

  let msg =
  document.getElementById("msg");

  // get license from Supabase
  let { data, error } =
  await client
  .from("licenses")
  .select("*")
  .eq("key", userKey)
  .single();

  if(error || !data){

    msg.innerHTML =
    "Invalid License ❌";

    return;
  }

  // blocked license
  if(data.status !== "active"){

    msg.innerHTML =
    "License Blocked ❌";

    return;
  }

  // local device id
  let deviceID =
  localStorage.getItem("deviceID");

  if(!deviceID){

    deviceID =
    "DEV-" +
    Math.random().toString(36).substring(2);

    localStorage.setItem(
      "deviceID",
      deviceID
    );
  }

  // first device lock
  if(!data.device_id){

    await client
    .from("licenses")
    .update({
      device_id: deviceID
    })
    .eq("id", data.id);

    data.device_id = deviceID;
  }

  // device mismatch
  if(data.device_id !== deviceID){

    msg.innerHTML =
    "This license is already used on another device ❌";

    return;
  }

  // access granted
  document.getElementById("book")
  .style.display = "block";

  msg.innerHTML =
  "Access Granted ✔";

}

</script>

</body>
</html>
