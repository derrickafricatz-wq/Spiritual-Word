<!DOCTYPE html>
<html>

<head>

  <title>Spiritual Eyes</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffff">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    body{
      background:black;

    }

      padding:12px;

    button{
      padding:12px 20px;

    #book{
      display:none;

    }

</head>

<body>

  <button id="installBtn"
    style="position:fixed;bottom:20px;right:20px;padding:10px;background:#00ffff;border:none;border-radius:10px;display:none;z-index:200;">
    Install App
  </button>

<h1>🔐 Spiritual Eyes</h1>

<p>Enter your license key</p>

<input id="key" placeholder="License Key">

<br>

<button onclick="unlockBook()">
Unlock Book
</button>

<p id="msg"></p>

<div id="book">

<iframe
src="book.pdf"
width="100%"
height="700px"
style="border:none;">
</iframe>

</div>

<script>

const SUPABASE_URL =
"https://xbemkmvvbkxknuduthsg.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

const client =
supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function unlockBook(){

  let userKey =
  document.getElementById("key").value;

  let msg =
  document.getElementById("msg");

  // get license
  let { data, error } =
  await client
    .from("licenses")
    .select("*")
    .eq("key", userKey);

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error){
  console.log(error);
  msg.innerHTML =
  "ERROR: " + JSON.stringify(error);
  return;
}

  if(!data || data.length === 0){
    msg.innerHTML =
    "Invalid License ❌";
    return;
  }

  let license = data[0];

  // check status
  if(license.status !== "active"){
    msg.innerHTML = "License Blocked ❌";
    return;
  }

  // device ID
  let deviceID =
  localStorage.getItem("deviceID");

  if(!deviceID){

    deviceID =
    "DEV-" + Math.random().toString(36).substring(2);

    localStorage.setItem("deviceID", deviceID);
  }

  // first time bind device
  if(!license.device_id){

    await client
    .from("licenses")
    .update({ device_id: deviceID })
    .eq("id", license.id);

    license.device_id = deviceID;
  }

  // device mismatch
  if(license.device_id !== deviceID){

    msg.innerHTML =
    "This license is already used on another device ❌";

    return;
  }

  // success
  document.getElementById("book").style.display = "block";
  msg.innerHTML = "Access Granted ✔";

}

</script>

  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW failed", err));
}
</script>

</body>
</html>
